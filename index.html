<!doctype html>
<html lang="fr">
  <head>
    <meta charset="UTF-8" />
    <meta
      name="viewport"
      content="width=device-width, initial-scale=1.0, viewport-fit=cover"
    />
    <meta name="theme-color" content="#0d1117" />
    <meta
      name="description"
      content="Gestionnaire de notes hors-ligne, rapide et sécurisé."
    />
    <meta name="apple-mobile-web-app-capable" content="yes" />

    <meta name="mobile-web-app-capable" content="yes" />

    <meta
      name="apple-mobile-web-app-status-bar-style"
      content="black-translucent"
    />
    <meta name="apple-mobile-web-app-title" content="NoteForge" />

    <link rel="manifest" href="manifest.json" />
    <link rel="icon" href="icons/icon-192.png" />
    <link rel="apple-touch-icon" href="icons/icon-192.png" />
    <link rel="stylesheet" href="style.css" />
    <title>NoteForge</title>
  </head>
  <body>
    <header id="app-header">
      <div class="header-left">
        <div class="logo-mark">
          <svg width="22" height="22" viewBox="0 0 22 22" fill="none">
            <rect
              x="1"
              y="1"
              width="9"
              height="9"
              rx="2"
              fill="var(--accent)"
            />
            <rect
              x="12"
              y="1"
              width="9"
              height="9"
              rx="2"
              fill="var(--accent-dim)"
            />
            <rect
              x="1"
              y="12"
              width="9"
              height="9"
              rx="2"
              fill="var(--accent-dim)"
            />
            <rect
              x="12"
              y="12"
              width="9"
              height="9"
              rx="2"
              fill="var(--accent)"
            />
          </svg>
        </div>
        <span class="app-title">NoteForge</span>
      </div>
      <div class="header-right">
        <span id="save-status" class="save-status" aria-live="polite">—</span>
        <button
          id="btn-new"
          class="icon-btn"
          title="Nouvelle note"
          aria-label="Nouvelle note"
        >
          <svg
            width="18"
            height="18"
            viewBox="0 0 24 24"
            fill="none"
            stroke="currentColor"
            stroke-width="2"
            stroke-linecap="round"
            stroke-linejoin="round"
          >
            <line x1="12" y1="5" x2="12" y2="19" />
            <line x1="5" y1="12" x2="19" y2="12" />
          </svg>
        </button>
      </div>
    </header>

    <main id="app-main">
      <aside id="sidebar">
        <div class="sidebar-header">
          <span class="sidebar-label">MES NOTES</span>
          <span id="note-count" class="note-count">0</span>
        </div>
        <ul id="note-list" role="listbox" aria-label="Liste des notes"></ul>
      </aside>

      <section id="editor-pane">
        <div id="editor-meta">
          <input
            id="note-title"
            type="text"
            placeholder="Titre de la note…"
            autocomplete="off"
            spellcheck="false"
          />
          <span id="char-count" class="char-count">0 car.</span>
        </div>
        <textarea
          id="note-body"
          placeholder="Commence à écrire… tout est sauvegardé automatiquement."
          spellcheck="false"
          aria-label="Contenu de la note"
        ></textarea>
      </section>
    </main>

    <div id="fab-container">
      <button
        id="fab-delete"
        class="fab fab-secondary"
        title="Supprimer la note"
        aria-label="Supprimer la note"
      >
        <svg
          width="20"
          height="20"
          viewBox="0 0 24 24"
          fill="none"
          stroke="currentColor"
          stroke-width="2"
          stroke-linecap="round"
          stroke-linejoin="round"
        >
          <polyline points="3 6 5 6 21 6" />
          <path d="M19 6l-1 14a2 2 0 01-2 2H8a2 2 0 01-2-2L5 6" />
          <path d="M10 11v6" />
          <path d="M14 11v6" />
          <path d="M9 6V4h6v2" />
        </svg>
      </button>
      <button
        id="fab-save"
        class="fab fab-primary"
        title="Enregistrer"
        aria-label="Enregistrer la note"
      >
        <svg
          width="20"
          height="20"
          viewBox="0 0 24 24"
          fill="none"
          stroke="currentColor"
          stroke-width="2"
          stroke-linecap="round"
          stroke-linejoin="round"
        >
          <path
            d="M19 21H5a2 2 0 01-2-2V5a2 2 0 012-2h11l5 5v11a2 2 0 01-2 2z"
          />
          <polyline points="17 21 17 13 7 13 7 21" />
          <polyline points="7 3 7 8 15 8" />
        </svg>
      </button>
    </div>

    <div id="toast" role="status" aria-live="polite"></div>

    <div id="install-banner" hidden>
      <span>Installer NoteForge sur votre écran d'accueil ?</span>
      <div class="install-actions">
        <button id="btn-install-yes">Installer</button>
        <button id="btn-install-no">Plus tard</button>
      </div>
    </div>

    <div id="offline-banner" hidden>
      <svg
        width="15"
        height="15"
        viewBox="0 0 24 24"
        fill="none"
        stroke="currentColor"
        stroke-width="2.5"
        stroke-linecap="round"
        stroke-linejoin="round"
      >
        <line x1="1" y1="1" x2="23" y2="23" />
        <path d="M16.72 11.06A10.94 10.94 0 0 1 19 12.55" />
        <path d="M5 12.55a10.94 10.94 0 0 1 5.17-2.39" />
        <path d="M10.71 5.05A16 16 0 0 1 22.56 9" />
        <path d="M1.42 9a15.91 15.91 0 0 1 4.7-2.88" />
        <path d="M8.53 16.11a6 6 0 0 1 6.95 0" />
        <line x1="12" y1="20" x2="12.01" y2="20" />
      </svg>
      <span>Mode hors-ligne — vos notes restent disponibles</span>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/idb-keyval@6/dist/umd.js"></script>
    <script src="app.js"></script>
  </body>
</html>
